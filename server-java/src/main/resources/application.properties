spring.application.name=Agricultural Trading Platform

# Server Configuration
server.port=${PORT:8080}

# Allow circular references (temporary fix)
spring.main.allow-circular-references=true

# Database Configuration (Works with Railway, Render, or local)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/contract_farming}
spring.datasource.username=${DATABASE_USER:somesh}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.time-zone=UTC

# Logging Configuration
logging.level.com.agri=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-change-in-production-min-32-chars-for-security}
app.jwt.expiration-ms=604800000

# CORS Configuration (Update with your Vercel URL in production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://client-chi-lilac.vercel.app}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Data File Configuration (Hybrid Mode)
app.data.use-file-database=false
app.data.config-path=./config
app.data.auto-save=true
