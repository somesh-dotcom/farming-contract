services:
  - type: web
    name: agri-trading-backend
    env: java
    region: oregon
    plan: free
    rootDir: server-java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    healthCheckPath: /api/health
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:5173,https://client-chi-lilac.vercel.app"
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: agri-trading-db
          property: connectionString

databases:
  - name: agri-trading-db
    plan: free
    databaseName: contract_farming
    user: agri_admin
